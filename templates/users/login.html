{% extends 'base/base.html' %}

{% block title %}Connexion - MediRDV{% endblock %}

{% block content %}
<div class="cards-grid" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 class="text-center" style="margin-bottom: 20px;">Connexion</h2>
        
        {% if error %}
            <div style="background-color: var(--red); color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center;">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="field">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="field mt-20 text-center">
                <button type="submit" class="btn" style="width: 100%;">Se connecter</button>
            </div>
        </form>
        
        <p class="text-center mt-20" style="font-size: 14px;">
            Pas encore de compte ? <a href="{% url 'register' %}" style="color: var(--teal); text-decoration: none;">S'inscrire</a>
        </p>
    </div>
</div>
{% endblock %}
